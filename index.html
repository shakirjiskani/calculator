<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .btn-click { transform: scale(1); transition: transform 0.1s ease-in-out, background-color 0.2s; }
        .btn-click:active { transform: scale(0.93); }
        /* Hide scrollbar for input */
        input[type="text"]::-webkit-outer-spin-button,
        input[type="text"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>

    <script>
        let displayValue = '';
        let errorState = false;

        function updateScreen() {
            const screen = document.getElementById('display');
            screen.value = displayValue;
            if (errorState) {
                screen.classList.add('text-rose-500');
                screen.classList.remove('text-slate-800');
            } else {
                screen.classList.remove('text-rose-500');
                screen.classList.add('text-slate-800');
            }
        }

        function insertValue(val) {
            if (errorState) {
                displayValue = val;
                errorState = false;
            } else {
                displayValue += val;
            }
            updateScreen();
        }

        function clearDisplay() {
            displayValue = '';
            errorState = false;
            updateScreen();
        }

        function deleteLast() {
            if (errorState) {
                displayValue = '';
                errorState = false;
            } else {
                displayValue = displayValue.slice(0, -1);
            }
            updateScreen();
        }

        function calculateResult() {
            try {
                // Remove any unsafe characters before evaluation
                const sanitized = displayValue.replace(/[^-()\d/*+.]/g, '');
                if (!sanitized) return;
                
                const result = new Function('return ' + sanitized)();
                
                if (!isFinite(result)) throw new Error('Math error');
                displayValue = String(result);
                errorState = false;
            } catch (e) {
                displayValue = 'Error';
                errorState = true;
            }
            updateScreen();
        }

        function calculateTrig(func) {
            try {
                if (!displayValue) return;
                const val = parseFloat(displayValue);
                if (isNaN(val)) throw new Error('Not a number');
                
                const radians = (val * Math.PI) / 180;
                let result = func === 'cos' ? Math.cos(radians) : Math.tan(radians);
                
                displayValue = result.toFixed(4).replace(/\.?0+$/, '');
                errorState = false;
            } catch {
                displayValue = 'Error';
                errorState = true;
            }
            updateScreen();
        }
    </script>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col justify-center items-center p-4 text-slate-800">
    
    <!-- Header -->
    <div class="mb-8 text-center text-slate-500 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="10" y2="10"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="18" y2="18"/></svg>
        <h1 class="text-xl font-medium tracking-tight">Calculator-Project</h1>
    </div>

    <!-- Main Calculator Body -->
    <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200 border border-slate-100 max-w-sm w-full mx-auto">
        <!-- Display Screen -->
        <div class="bg-slate-50 rounded-2xl h-24 mb-6 flex flex-col justify-end p-5 overflow-hidden relative border border-slate-100">
            <input 
                type="text" 
                id="display" 
                readonly
                placeholder="0"
                class="w-full bg-transparent text-right text-4xl font-mono focus:outline-none placeholder:text-slate-300 text-slate-800"
            />
        </div>

        <!-- Buttons Grid -->
        <div class="grid grid-cols-4 gap-3">
            
            <!-- Row 1 -->
            <button onclick="clearDisplay()" class="btn-click h-14 rounded-2xl text-lg flex items-center justify-center bg-zinc-100 text-rose-500 hover:bg-rose-50 font-medium shadow-sm outline-none">C</button>
            <button onclick="calculateTrig('cos')" class="btn-click h-14 rounded-2xl text-base flex items-center justify-center bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-medium shadow-sm outline-none">cos</button>
            <button onclick="calculateTrig('tan')" class="btn-click h-14 rounded-2xl text-base flex items-center justify-center bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-medium shadow-sm outline-none">tan</button>
            <button onclick="deleteLast()" class="btn-click h-14 rounded-2xl text-lg flex items-center justify-center bg-zinc-100 text-amber-500 hover:bg-amber-50 font-medium shadow-sm outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 5H9l-7 7 7 7h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Z"/><line x1="18" x2="12" y1="9" y2="15"/><line x1="12" x2="18" y1="9" y2="15"/></svg>
            </button>

            <!-- Row 2 -->
            <button onclick="insertValue('7')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 outline-none">7</button>
            <button onclick="insertValue('8')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 outline-none">8</button>
            <button onclick="insertValue('9')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 outline-none">9</button>
            <button onclick="insertValue('/')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-medium shadow-sm outline-none">÷</button>

            <!-- Row 3 -->
            <button onclick="insertValue('4')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 outline-none">4</button>
            <button onclick="insertValue('5')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 outline-none">5</button>
            <button onclick="insertValue('6')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 outline-none">6</button>
            <button onclick="insertValue('*')" class="btn-click h-14 rounded-2xl text-2xl flex items-center justify-center bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-medium shadow-sm outline-none">×</button>

            <!-- Row 4 -->
            <button onclick="insertValue('1')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 outline-none">1</button>
            <button onclick="insertValue('2')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 outline-none">2</button>
            <button onclick="insertValue('3')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 outline-none">3</button>
            <button onclick="insertValue('-')" class="btn-click h-14 rounded-2xl text-2xl flex items-center justify-center bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-medium shadow-sm outline-none">−</button>

            <!-- Row 5 -->
            <button onclick="insertValue('%')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 outline-none">%</button>
            <button onclick="insertValue('0')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 outline-none">0</button>
            <button onclick="insertValue('.')" class="btn-click h-14 rounded-2xl text-xl flex items-center justify-center bg-white border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 outline-none">.</button>
            <button onclick="insertValue('+')" class="btn-click h-14 rounded-2xl text-2xl flex items-center justify-center bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-medium shadow-sm outline-none">+</button>

            <!-- Equals Button -->
            <button onclick="calculateResult()" class="btn-click col-span-4 h-14 rounded-2xl text-2xl flex items-center justify-center bg-indigo-500 text-white hover:bg-indigo-600 shadow-md hover:shadow-lg font-medium outline-none">=</button>
        </div>
    </div>
</body>
</html>
